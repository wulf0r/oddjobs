services:
  postgres:
    image: postgres:18.4-alpine
    container_name: oddjobs-postgres
    environment:
      POSTGRES_DB: helloworld
      POSTGRES_USER: helloworld
      POSTGRES_PASSWORD: helloworld
    ports:
      - "9993:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helloworld -d helloworld"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    volumes:
      - oddjobs-postgres-data:/var/lib/postgresql

  dev:
    build:
      context: .
      dockerfile: docker/dev/Dockerfile
    container_name: oddjobs-dev
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /workspace/oddjobs
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      GRADLE_USER_HOME: /home/oddjobs/.gradle
      COREPACK_HOME: /home/oddjobs/.cache/corepack
      ODDJOBS_DB_HOST: postgres
      ODDJOBS_DB_PORT: 5432
      ODDJOBS_DB_NAME: helloworld
      ODDJOBS_DB_USER: helloworld
      ODDJOBS_DB_PASSWORD: helloworld
      ODDJOBS_DB_URL: jdbc:postgresql://postgres:5432/helloworld
      SERVER_PORT: 9991
      VITE_PORT: 9992
      VITE_BACKEND_PROXY_TARGET: http://localhost:9991
      ODDJOBS_DEV_LOG: /workspace/oddjobs/docker/dev/container.log
    ports:
      - "9991:9991"
      - "9992:9992"
      - "9994:9994"
    volumes:
      - .:/workspace/oddjobs
      - oddjobs-gradle-home:/home/oddjobs/.gradle
      - oddjobs-corepack-home:/home/oddjobs/.cache/corepack
      - oddjobs-frontend-nodeModules:/home/oddjobs/frontend/node_modules
      - oddjobs-nodeModules:/home/oddjobs/node_modules
      #- oddjobs-backend-build:/home/oddjobs/backend/build
      - oddjobs-shared-build:/home/oddjobs/shared/build
    tmpfs:
      - /workspace/oddjobs/.gradle:uid=1000,gid=1000,mode=0775
    init: true

volumes:
  oddjobs-postgres-data:
  oddjobs-gradle-home:
  oddjobs-corepack-home:
  oddjobs-frontend-nodeModules:
  oddjobs-nodeModules:
  oddjobs-backend-build:
  oddjobs-shared-build: