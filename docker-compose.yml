services:
  postgres:
    image: postgres:17.10-alpine
    container_name: oddjobs-postgres
    environment:
      POSTGRES_DB: helloworld
      POSTGRES_USER: helloworld
      POSTGRES_PASSWORD: helloworld
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helloworld -d helloworld"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    volumes:
      - oddjobs-postgres-data:/var/lib/postgresql/data

volumes:
  oddjobs-postgres-data:
